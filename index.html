<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gia phả</title>

<script src="https://unpkg.com/d3@7"></script>
<script src="https://unpkg.com/topola@latest/dist/topola.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
}

#tree {
    width: 100%;
    height: 100vh;
}

/* Node style */
.node-box {
    width: 160px;
    text-align: center;
    font-size: 12px;
}

.node-box img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 50%;
}

.name {
    font-weight: bold;
}

.year {
    color: #666;
    font-size: 11px;
}
</style>
</head>

<body>

<div id="tree"></div>

<script>

// 🔴 DÁN LINK GOOGLE SHEET CSV Ở ĐÂY
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSIq7-JrJBxlOp6e-brAHGaWLE2pzNKeNUkaDoLaF8BaEQH0iD-D5KcwopMONrgc0qfj08KNWKfIvo4/pub?gid=0&single=true&output=csv";

fetch(CSV_URL)
    .then(res => res.text())
    .then(csv => {

        const data = d3.csvParse(csv);

        // Convert CSV → format Topola
        const persons = {};
        const relations = [];

        data.forEach(row => {

            const id = row["ID"];

            persons[id] = {
                id: id,
                name: row["Họ Và Tên"],
                gender: row["Giới tính"] === "Nam" ? "M" : "F",
                birth: row["Năm sinh - Mất"],
                photo: row["Photo"],
                note: row["Ghi chú"]
            };

            // Quan hệ cha mẹ
            if (row["FID"] && row["MID"]) {
                relations.push({
                    type: "parentChild",
                    parents: [row["FID"], row["MID"]],
                    child: id
                });
            }

            // Quan hệ vợ chồng
            if (row["PIDS"]) {
                row["PIDS"].split(",").forEach(pid => {
                    relations.push({
                        type: "couple",
                        members: [id, pid.trim()]
                    });
                });
            }

        });

        // Init Topola
        const chart = new Topola.Tree("#tree", {

            data: {
                persons: persons,
                relations: relations
            },

            // Template node
            nodeContent: function(person) {
                return `
                    <div class="node-box">
                        <img src="${person.photo || ''}" onerror="this.style.display='none'"/>
                        <div class="name">${person.name || ''}</div>
                        <div class="year">${person.birth || ''}</div>
                    </div>
                `;
            }

        });

        // Focus root (person đầu tiên)
        const firstId = Object.keys(persons)[0];
        chart.setRoot(firstId);

    });

</script>

</body>
</html>
