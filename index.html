<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Cây gia phả – trực hệ cha</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }
    h2 { text-align: center; }
    h4 { margin: 6px 0; }

    .tree {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    .level {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }
    .node {
      width: 140px;
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
      cursor: pointer;
    }
    .node img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 6px;
      background: #ddd;
    }
    .name { font-weight: bold; font-size: 14px; }
    .year { font-size: 12px; opacity: .8; }

    .male   { background: #eef3ff; border-top: 5px solid #4a7cff; }
    .female { background: #ffeef5; border-top: 5px solid #ff6fa8; }

    .error {
      color: red;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>

<body>
  <h2>Cây gia phả (trực hệ cha – 3 đời dưới)</h2>
  <div id="tree" class="tree">Đang tải dữ liệu…</div>

  <!-- FILE JS RIÊNG -->
  <script src="familytree.js"></script>
</body>
</html>
``
